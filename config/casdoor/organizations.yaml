# Casdoor Organization Definitions
# Apply with: make casdoor-provision
#
# admin_org: the global Casdoor admin org that owns application/provider records.
#            Casdoor's default is "built-in" — this must match your Casdoor instance.
# user_org:  the org where end-users register via the Ushadow apps.
#            Must NOT be "built-in" (reserved for Casdoor global admins).

admin_org: admin
user_org: ushadow

organizations:
  - name: ushadow
    displayName: "Ushadow"
    phonePrefix: "1"
    enableSoftDeletion: false
    isProfilePublic: false
    languages:
      - en
    passwordType: bcrypt
    passwordOptions:
      - AtLeast6
    tags: []
    userTypes: []
