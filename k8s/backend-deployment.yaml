apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: backend
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend
  template:
    metadata:
      labels:
        io.kompose.service: backend
    spec:
      containers:
        - envFrom:
            # K8s env vars sourced from .env.k8s (KC_HOSTNAME_URL, CORS_ORIGINS, etc.)
            - configMapRef:
                name: backend-k8s-env
            # Secrets (MONGODB_URI, KEYCLOAK_ADMIN_PASSWORD) — apply once manually:
            #   kubectl apply -f k8s/secret.yaml
            - secretRef:
                name: ushadow-secret
                optional: true
          image: registry.temp.skaffold/ushadow-backend
          name: ushadow-backend
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /app/data
      tolerations:
        - key: "gpu"
          operator: "Equal"
          value: "amd"
          effect: "NoSchedule"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: ushadow-config
        - name: data
          persistentVolumeClaim:
            claimName: ushadow-data
      restartPolicy: Always
